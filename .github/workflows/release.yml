name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Update latest tag
        run: |
          git tag -f latest
          git push origin latest --force

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          make_latest: true
          files: |
            vsapstar
            sap_audit_hook
          body: |
            Compiled binaries for Linux x86_64.

            Requires: `<sid>adm` shell, `ptrace_scope` ≤ 1, SAP kernel 916.

            See [README](README.md) for usage.
