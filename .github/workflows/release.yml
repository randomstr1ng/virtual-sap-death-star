name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Update latest tag
        run: |
          git tag -f latest
          git push origin latest --force

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          make_latest: true
          files: |
            vsapstar
            sap_audit_hook
          body: |
            Compiled binaries for Linux x86_64. Statically linked — no glibc
            version dependency, runs on any target (incl. older SLES).

            Requires: `<sid>adm` shell, `ptrace_scope` ≤ 1.

            vsapstar resolves function addresses from the target disp+work's
            ELF symtab at runtime (kernel-build independent). If that lookup
            fails, it aborts rather than guessing — pass --force-legacy-offsets
            to force the old kernel-916 hardcoded offsets (unsafe on other
            kernel builds/releases).

            See [README](README.md) for usage.
